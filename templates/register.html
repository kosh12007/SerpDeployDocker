<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - SEO орбита</title>
    <meta name="description"
        content="Создайте аккаунт в SEO орбита, чтобы начать использовать профессиональные инструменты для SEO-специалистов.">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/toastify.css') }}">
</head>

<body>
    <div class="form-container">
        <h1>📝 Регистрация</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}" role="alert">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/auth/register">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>

        <div class="links">
            Уже есть аккаунт? <a href="/auth/login">Войти</a>
        </div>
    </div>
    <script type="text/javascript" src="{{ url_for('static', filename='js/toastify.js') }}"></script>

    <div id="flash-messages" style="display: none;"
        data-messages='{{ get_flashed_messages(with_categories=true) | tojson }}'></div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const flashDiv = document.getElementById('flash-messages');
            const messages = JSON.parse(flashDiv.dataset.messages || '[]');

            messages.forEach(item => {
                const category = item[0];
                const message = item[1];
                let color = "#2196F3";
                if (category === 'success') color = "#4CAF50";
                else if (category === 'danger') color = "#EF4444";

                Toastify({
                    text: message,
                    duration: 3000,
                    close: true,
                    gravity: "top",
                    position: "right",
                    style: {
                        background: color
                    },
                    stopOnFocus: true,
                }).showToast();
            });
        });

    </script>

</body>

</html>
