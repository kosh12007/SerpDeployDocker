{% extends "layout.html" %}

{% block title %}
Создание нового проекта
{% endblock %}

{% block content %}
<div class="container mx-auto px-4">
    <h1 class="text-2xl font-bold my-4">Создание нового проекта</h1>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" role="alert">
        {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="{{ url_for('project_routes.create_project') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mb-4">
            <label for="name" class="block mb-2">Название проекта</label>
            <input type="text" id="name" name="name" placeholder="Введите название проекта" required class="shadow w-full p-2 border rounded bg-white dark:bg-gray-800 text-gray-90 dark:text-gray-200 
                border-gray-300 dark:border-gray-600" autocomplete="off">
        </div>
        <div class="mb-4">
            <label for="url" class="block mb-2">URL проекта</label>
            <input type="url" id="url" name="url" placeholder="URL проекта" required class="shadow w-full p-2 border rounded bg-white dark:bg-gray-800 text-gray-90 dark:text-gray-200 
                border-gray-300 dark:border-gray-600" autocomplete="off">
        </div>
        <button type="submit"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            Создать
        </button>
    </form>
</div>
{% endblock %}
