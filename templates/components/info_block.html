{% macro render_info_block(title, content, id_prefix='info') %}
<div id="{{ id_prefix }}-block"
    class="mt-6 p-4 bg-blue-100 dark:bg-blue-900/30 border-l-4 border-blue-500 text-blue-700 dark:text-blue-300 relative"
    role="alert">
    <p class="font-bold">{{ title }}</p>
    <button id="{{ id_prefix }}-toggle-btn"
        class="absolute border-2 border-green-500 top-0.5 pl-1 pr-1 rounded-md right-2 text-blue-700 hover:text-blue-500 dark:text-blue-100 dark:hover:text-blue-300">Показать</button>
    <div id="{{ id_prefix }}-content" class="hidden">
        {{ content|safe }}
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggleBtn = document.getElementById('{{ id_prefix }}-toggle-btn');
        const content = document.getElementById('{{ id_prefix }}-content');
        if (toggleBtn && content) {
            toggleBtn.addEventListener('click', function () {
                const isHidden = content.classList.toggle('hidden');
                toggleBtn.textContent = isHidden ? 'Показать' : 'Скрыть';
            });
        }
    });
</script>
{% endmacro %}
