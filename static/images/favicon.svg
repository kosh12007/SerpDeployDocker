<svg viewBox="0 0 128 128" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>
    <linearGradient id="orb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#0022cc"/>
    </linearGradient>
  </defs>

  <!-- Темный фон со скругленными краями (радиус 32) -->
  <rect width="128" height="128" fill="#020612" rx="32"/>

  <g transform="translate(64, 64)">
    
    <!-- Орбита 1 (повернута строго на -45 градусов, чтобы ее вершины (радиусы) смотрели ровно в углы скругленного фона) -->
    <g transform="rotate(-45)">
      <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="#00ffff" stroke-width="20" opacity="0.2"/>
      <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="url(#orb1)" stroke-width="12"/>
      <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    </g>

    <!-- Орбита 2 (повернута строго на +45 градусов, идет в противоположные углы) -->
    <g transform="rotate(45)">
      <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="#0088ff" stroke-width="20" opacity="0.2"/>
      <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="url(#orb2)" stroke-width="12"/>
      <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    </g>

    <!-- Центральная буква S -->
    <text x="0" y="28" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="82" fill="#020612" stroke="#020612" stroke-width="14" stroke-linejoin="round" text-anchor="middle">S</text>
    <text x="0" y="28" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="82" fill="#ffffff" text-anchor="middle">S</text>
  </g>
</svg>