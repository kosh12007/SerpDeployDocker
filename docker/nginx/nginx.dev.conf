# ===============================================================
# Nginx конфигурация для DEV-окружения
# Простой HTTP без SSL — для локальной разработки
# Доступ: http://localhost
# ===============================================================

# Настройки воркеров Nginx
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Максимум соединений на воркер
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Формат лога
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Оптимизация передачи файлов
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Таймаут keepalive
    keepalive_timeout 65;

    # Максимальный размер загружаемых файлов (Excel, CSV)
    client_max_body_size 50M;

    # Настройки gzip-сжатия
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Upstream — Flask-приложение через gunicorn
    upstream flask_app {
        server web:8000;
        # keepalive для переиспользования соединений
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Отдаём статические файлы напрямую (без Flask)
        # Это ускоряет отдачу CSS/JS/изображений
        location /static/ {
            alias /app/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Все остальные запросы проксируем на Flask/gunicorn
        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;

            # Заголовки для Flask — он узнаёт реальный IP клиента
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Таймауты для долгих операций (парсинг SERP)
            proxy_connect_timeout 60s;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }
    }
}
